<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Mon Régime</title>

<!-- ✅ iPhone App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Régime">

<!-- ✅ Icône -->
<link rel="apple-touch-icon" href="icon.png">

<meta name="theme-color" content="#f7f5ee">

<style>
:root{
--bg:#eef3f6;
--card:#ffffff;
--text:#183041;

/* couleurs icône */
--good:#2f7d5b;
--good-soft:#e7f4ea;

--medium:#f2b705;
--medium-soft:#fff4cf;

--bad:#e67e22;
--bad-soft:#ffe9dc;

--empty:#f1f2ef;
}

/* GLOBAL */

body{
margin:0;
font-family:-apple-system;
background:var(--bg);
padding:20px;
}

h1{
margin:0 0 10px;
}

/* CALENDRIER STYLE ICÔNE */

.calendar-shell{
background:linear-gradient(180deg,#fffdf8,#f7f5ee);
border-radius:24px;
padding:16px;
margin-bottom:16px;
}

.selected{
background:#eef6ef;
padding:10px;
border-radius:12px;
margin-bottom:10px;
font-weight:bold;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
aspect-ratio:1;
border-radius:12px;
padding:8px;
font-weight:bold;
}

.day.good{background:var(--good-soft);color:var(--good);}
.day.medium{background:var(--medium-soft);color:#b88600;}
.day.bad{background:var(--bad-soft);color:var(--bad);}
.day.empty{background:var(--empty);color:#aaa;}

.day.selected{
outline:3px solid #8bc34a;
}

/* CARDS */

.card{
background:var(--card);
border-radius:20px;
padding:16px;
margin-bottom:16px;
}

.stat{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

/* INPUT */

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2f7d5b;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Mon Régime</h1>

<div class="calendar-shell">
<div class="selected" id="selectedDate"></div>
<div class="calendar" id="calendar"></div>
</div>

<div class="card">
<div class="stat" id="in"></div>
<div class="stat" id="out"></div>
<div class="stat" id="balance"></div>
</div>

<div class="card">
<input id="food" placeholder="Aliment">
<input id="cal" type="number" placeholder="Calories">
<button onclick="addFood()">Ajouter aliment</button>
</div>

<div class="card">
<input id="sport" placeholder="Sport">
<input id="calSport" type="number" placeholder="Calories dépensées">
<button onclick="addSport()">Ajouter sport</button>
</div>

<script>
const STORAGE="regime_final";
let data=JSON.parse(localStorage.getItem(STORAGE)||'{"days":{}}');

let selected=new Date().toISOString().slice(0,10);

function getDay(d){
if(!data.days[d])data.days[d]={foods:[],sports:[]};
return data.days[d];
}

function totalIn(day){return day.foods.reduce((s,f)=>s+f.cal,0);}
function totalOut(day){return day.sports.reduce((s,f)=>s+f.cal,0);}

function getClass(balance){
if(balance==null)return"empty";
if(balance<=-1)return"good";
if(balance<200)return"medium";
return"bad";
}

function renderCalendar(){
const cal=document.getElementById("calendar");
cal.innerHTML="";

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();

const days=new Date(year,month+1,0).getDate();

for(let d=1;d<=days;d++){
const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const day=getDay(iso);

const balance=totalIn(day)-totalOut(day);

cal.innerHTML+=`
<div class="day ${getClass(balance)}" onclick="select('${iso}')">${d}</div>`;
}
}

function select(d){
selected=d;
render();
}

function render(){
renderCalendar();

const day=getDay(selected);

const inC=totalIn(day);
const outC=totalOut(day);
const bal=inC-outC;

document.getElementById("selectedDate").innerText=selected;
document.getElementById("in").innerText="Calories : "+inC;
document.getElementById("out").innerText="Sport : "+outC;
document.getElementById("balance").innerText="Bilan : "+bal;

localStorage.setItem(STORAGE,JSON.stringify(data));
}

function addFood(){
const name=document.getElementById("food").value;
const cal=Number(document.getElementById("cal").value);
if(!name||!cal)return;
getDay(selected).foods.push({name,cal});
render();
}

function addSport(){
const name=document.getElementById("sport").value;
const cal=Number(document.getElementById("calSport").value);
if(!name||!cal)return;
getDay(selected).sports.push({name,cal});
render();
}

render();
</script>

</body>
</html>
