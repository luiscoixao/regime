<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mon Régime</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f3f4f6" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #183041;
      --muted: #7d8c97;
      --line: #d9e0e4;
      --soft: #f8fafb;
      --primary: #183a4a;
      --danger: #b23b3b;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      padding: 24px 18px 40px;
      max-width: 760px;
      margin: 0 auto;
    }

    .subtitle {
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: 42px;
      line-height: 1;
      font-weight: 800;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 700;
    }

    input {
      display: block;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 17px;
      background: #fbfbfc;
      color: var(--text);
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    input:focus {
      border-color: #b9c7cf;
      background: #fff;
    }

    input[type="date"] {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      font-size: 17px;
    }

    .top-date {
      display: grid;
      gap: 12px;
    }

    .selected-date {
      background: #eef4f6;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
    }

    .selected-date-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .selected-date-value {
      font-size: 24px;
      font-weight: 800;
    }

    .stats {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .stat {
      background: var(--soft);
      border: 1px solid #eaf0f2;
      border-radius: 22px;
      padding: 18px;
    }

    .stat-title {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
    }

    .field-group {
      margin-bottom: 14px;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      background: var(--primary);
      color: white;
      appearance: none;
      -webkit-appearance: none;
    }

    .button.secondary {
      background: #eef3f5;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .list-item {
      background: var(--soft);
      border: 1px solid #e9eef1;
      border-radius: 18px;
      padding: 14px;
    }

    .list-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .item-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .item-value {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .delete-btn {
      margin-top: 10px;
      border: none;
      background: transparent;
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
      padding: 0;
    }

    .empty {
      background: var(--primary);
      color: white;
      border-radius: 22px;
      padding: 18px;
      line-height: 1.45;
      font-size: 15px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: var(--soft);
      border: 1px solid #e9eef1;
      border-radius: 18px;
      padding: 14px;
    }

    .history-date {
      font-weight: 700;
    }

    .history-weight {
      font-weight: 800;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="subtitle">Suivi alimentaire</div>
  <h1>Mon Régime</h1>

  <div class="card">
    <h2>Calendrier</h2>

    <div class="top-date">
      <div>
        <label for="calendarInput">Choisir une date</label>
        <input id="calendarInput" type="date" />
      </div>

      <div class="selected-date">
        <div class="selected-date-label">Jour sélectionné</div>
        <div class="selected-date-value" id="selectedDateLabel"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="stats">
      <div class="stat">
        <div class="stat-title">Calories consommées</div>
        <div class="stat-value" id="caloriesIn">0 kcal</div>
      </div>

      <div class="stat">
        <div class="stat-title">Calories dépensées</div>
        <div class="stat-value" id="caloriesOut">0 kcal</div>
      </div>

      <div class="stat">
        <div class="stat-title">Bilan net</div>
        <div class="stat-value" id="balance">0 kcal</div>
      </div>

      <div class="stat">
        <div class="stat-title">Poids</div>
        <div class="stat-value" id="weightDisplay">—</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Ajouter un aliment</h2>

    <div class="field-group">
      <label for="foodInput">Aliment</label>
      <input id="foodInput" type="text" placeholder="Ex. yaourt nature" />
    </div>

    <div class="field-group">
      <label for="quantityInput">Quantité</label>
      <input id="quantityInput" type="text" placeholder="Ex. 1 pot / 150 g" />
    </div>

    <div class="field-group">
      <label for="foodCaloriesInput">Calories</label>
      <input id="foodCaloriesInput" type="number" inputmode="decimal" placeholder="Ex. 90" />
    </div>

    <button class="button" id="addFoodBtn">Ajouter aliment à cette date</button>
  </div>

  <div class="card">
    <h2>Ajouter une activité</h2>

    <div class="field-group">
      <label for="sportInput">Sport</label>
      <input id="sportInput" type="text" placeholder="Ex. marche rapide" />
    </div>

    <div class="field-group">
      <label for="sportCaloriesInput">Calories dépensées</label>
      <input id="sportCaloriesInput" type="number" inputmode="decimal" placeholder="Ex. 250" />
    </div>

    <button class="button" id="addSportBtn">Ajouter activité à cette date</button>
  </div>

  <div class="card">
    <h2>Poids du jour</h2>

    <div class="field-group">
      <label for="weightInput">Poids (kg)</label>
      <input id="weightInput" type="number" inputmode="decimal" step="0.1" placeholder="Ex. 74.8" />
    </div>

    <div class="button-row">
      <button class="button" id="saveWeightBtn">Enregistrer</button>
      <button class="button secondary" id="deleteWeightBtn">Supprimer</button>
    </div>
  </div>

  <div class="card">
    <h2>Aliments du jour sélectionné</h2>
    <div id="foodList" class="list"></div>
  </div>

  <div class="card">
    <h2>Activités du jour sélectionné</h2>
    <div id="sportList" class="list"></div>
  </div>

  <div class="card">
    <h2>Historique du poids</h2>
    <div id="weightHistory" class="list"></div>
  </div>

  <script>
    const STORAGE_KEY = "mon_regime_data_v3";

    const appData = loadData();

    const calendarInput = document.getElementById("calendarInput");
    const selectedDateLabel = document.getElementById("selectedDateLabel");

    const foodInput = document.getElementById("foodInput");
    const quantityInput = document.getElementById("quantityInput");
    const foodCaloriesInput = document.getElementById("foodCaloriesInput");

    const sportInput = document.getElementById("sportInput");
    const sportCaloriesInput = document.getElementById("sportCaloriesInput");

    const weightInput = document.getElementById("weightInput");

    const caloriesInEl = document.getElementById("caloriesIn");
    const caloriesOutEl = document.getElementById("caloriesOut");
    const balanceEl = document.getElementById("balance");
    const weightDisplayEl = document.getElementById("weightDisplay");
    const foodListEl = document.getElementById("foodList");
    const sportListEl = document.getElementById("sportList");
    const weightHistoryEl = document.getElementById("weightHistory");

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { days: {} };
        const parsed = JSON.parse(raw);
        if (!parsed.days || typeof parsed.days !== "object") return { days: {} };
        return parsed;
      } catch {
        return { days: {} };
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function todayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function isoToFR(iso) {
      if (!iso) return "";
      const [y, m, d] = iso.split("-");
      return `${d}/${m}/${y}`;
    }

    function isoToPrettyFR(iso) {
      if (!iso) return "";
      const [y, m, d] = iso.split("-");
      const date = new Date(Number(y), Number(m) - 1, Number(d));
      return date.toLocaleDateString("fr-FR", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function ensureDay(isoDate) {
      if (!appData.days[isoDate]) {
        appData.days[isoDate] = {
          foods: [],
          sports: [],
          weight: null
        };
      }
      return appData.days[isoDate];
    }

    function currentDateISO() {
      if (!calendarInput.value) {
        calendarInput.value = todayISO();
      }
      return calendarInput.value;
    }

    function totalFoodCalories(day) {
      return day.foods.reduce((sum, item) => sum + Number(item.calories || 0), 0);
    }

    function totalSportCalories(day) {
      return day.sports.reduce((sum, item) => sum + Number(item.calories || 0), 0);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      const iso = currentDateISO();
      const day = ensureDay(iso);

      selectedDateLabel.textContent = isoToPrettyFR(iso);

      const caloriesIn = totalFoodCalories(day);
      const caloriesOut = totalSportCalories(day);
      const balance = caloriesIn - caloriesOut;

      caloriesInEl.textContent = `${caloriesIn} kcal`;
      caloriesOutEl.textContent = `${caloriesOut} kcal`;
      balanceEl.textContent = `${balance} kcal`;
      weightDisplayEl.textContent = day.weight ? `${day.weight} kg` : "—";

      renderFoodList(day, iso);
      renderSportList(day, iso);
      renderWeightHistory();

      saveData();
    }

    function renderFoodList(day, iso) {
      if (!day.foods.length) {
        foodListEl.innerHTML = `<div class="empty">Aucun aliment enregistré pour cette date.</div>`;
        return;
      }

      foodListEl.innerHTML = day.foods.map((item, index) => `
        <div class="list-item">
          <div class="list-top">
            <div>
              <div class="item-title">${escapeHtml(item.name)}</div>
              <div class="item-meta">Quantité : ${escapeHtml(item.quantity || "—")}</div>
            </div>
            <div class="item-value">${Number(item.calories)} kcal</div>
          </div>
          <button class="delete-btn" onclick="deleteFood('${iso}', ${index})">Supprimer</button>
        </div>
      `).join("");
    }

    function renderSportList(day, iso) {
      if (!day.sports.length) {
        sportListEl.innerHTML = `<div class="empty">Aucune activité enregistrée pour cette date.</div>`;
        return;
      }

      sportListEl.innerHTML = day.sports.map((item, index) => `
        <div class="list-item">
          <div class="list-top">
            <div>
              <div class="item-title">${escapeHtml(item.name)}</div>
              <div class="item-meta">Activité enregistrée le ${escapeHtml(isoToFR(iso))}</div>
            </div>
            <div class="item-value">${Number(item.calories)} kcal</div>
          </div>
          <button class="delete-btn" onclick="deleteSport('${iso}', ${index})">Supprimer</button>
        </div>
      `).join("");
    }

    function renderWeightHistory() {
      const entries = Object.entries(appData.days)
        .filter(([_, day]) => day.weight !== null && day.weight !== "" && day.weight !== undefined)
        .sort((a, b) => b[0].localeCompare(a[0]));

      if (!entries.length) {
        weightHistoryEl.innerHTML = `<div class="empty">Aucun poids enregistré pour le moment.</div>`;
        return;
      }

      weightHistoryEl.innerHTML = entries.map(([iso, day]) => `
        <div class="history-item">
          <div class="history-date">${escapeHtml(isoToFR(iso))}</div>
          <div class="history-weight">${escapeHtml(String(day.weight))} kg</div>
        </div>
      `).join("");
    }

    function addFood() {
      const iso = currentDateISO();
      const day = ensureDay(iso);

      const name = foodInput.value.trim();
      const quantity = quantityInput.value.trim();
      const calories = Number(foodCaloriesInput.value);

      if (!name || !quantity || !foodCaloriesInput.value || Number.isNaN(calories)) {
        alert("Remplis aliment, quantité et calories.");
        return;
      }

      day.foods.push({ name, quantity, calories });

      foodInput.value = "";
      quantityInput.value = "";
      foodCaloriesInput.value = "";
      render();
    }

    function addSport() {
      const iso = currentDateISO();
      const day = ensureDay(iso);

      const name = sportInput.value.trim();
      const calories = Number(sportCaloriesInput.value);

      if (!name || !sportCaloriesInput.value || Number.isNaN(calories)) {
        alert("Remplis activité et calories dépensées.");
        return;
      }

      day.sports.push({ name, calories });

      sportInput.value = "";
      sportCaloriesInput.value = "";
      render();
    }

    function saveWeight() {
      const iso = currentDateISO();
      const day = ensureDay(iso);

      const weight = weightInput.value.trim();
      if (!weight) {
        alert("Entre un poids.");
        return;
      }

      day.weight = weight;
      weightInput.value = "";
      render();
    }

    function deleteWeight() {
      const iso = currentDateISO();
      const day = ensureDay(iso);
      day.weight = null;
      render();
    }

    function deleteFood(iso, index) {
      const day = ensureDay(iso);
      day.foods.splice(index, 1);
      render();
    }

    function deleteSport(iso, index) {
      const day = ensureDay(iso);
      day.sports.splice(index, 1);
      render();
    }

    window.deleteFood = deleteFood;
    window.deleteSport = deleteSport;

    document.getElementById("addFoodBtn").addEventListener("click", addFood);
    document.getElementById("addSportBtn").addEventListener("click", addSport);
    document.getElementById("saveWeightBtn").addEventListener("click", saveWeight);
    document.getElementById("deleteWeightBtn").addEventListener("click", deleteWeight);

    calendarInput.addEventListener("change", render);

    calendarInput.value = todayISO();
    render();
  </script>
</body>
</html>
