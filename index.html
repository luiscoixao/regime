<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mon Régime</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #183041;
    }

    body {
      padding: 24px 20px 40px;
    }

    .subtitle {
      color: #7b8a95;
      letter-spacing: 3px;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 42px;
      line-height: 1;
      font-weight: 800;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    label {
      display: block;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    input {
      display: block;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      border: 1px solid #d9dde2;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 18px;
      background: #f8f8fa;
      color: #183041;
      appearance: none;
      -webkit-appearance: none;
    }

    .date-wrap {
      width: 100%;
      overflow: hidden;
    }

    .date-field {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      text-align: center;
      font-size: 18px;
    }

    .stats {
      display: grid;
      gap: 16px;
      margin-bottom: 18px;
    }

    .stat {
      background: #f7f8fb;
      border-radius: 20px;
      padding: 22px;
    }

    .stat-title {
      color: #7b8a95;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.1;
    }

    .field-group {
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      font-weight: 700;
      background: #183a4a;
      color: white;
      margin-top: 8px;
      appearance: none;
      -webkit-appearance: none;
    }

    .muted {
      color: #7b8a95;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="subtitle">Suivi alimentaire</div>
  <h1>Mon Régime</h1>

  <div class="card">
    <label for="date">Date</label>
    <div class="date-wrap">
      <input id="date" class="date-field" type="text" inputmode="numeric" placeholder="15/03/2026" />
    </div>
    <div class="muted">Format : jj/mm/aaaa</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-title">Calories consommées</div>
      <div class="stat-value" id="caloriesIn">0 kcal</div>
    </div>

    <div class="stat">
      <div class="stat-title">Calories dépensées</div>
      <div class="stat-value" id="caloriesOut">0 kcal</div>
    </div>

    <div class="stat">
      <div class="stat-title">Bilan net</div>
      <div class="stat-value" id="balance">0 kcal</div>
    </div>

    <div class="stat">
      <div class="stat-title">Poids</div>
      <div class="stat-value" id="weightDisplay">—</div>
    </div>
  </div>

  <div class="card">
    <div class="field-group">
      <label for="food">Aliment</label>
      <input id="food" type="text" />
    </div>

    <div class="field-group">
      <label for="quantity">Quantité</label>
      <input id="quantity" type="text" />
    </div>

    <div class="field-group">
      <label for="foodCalories">Calories</label>
      <input id="foodCalories" type="number" inputmode="decimal" />
    </div>

    <button onclick="addFood()">Ajouter aliment</button>
  </div>

  <div class="card">
    <div class="field-group">
      <label for="sport">Sport</label>
      <input id="sport" type="text" />
    </div>

    <div class="field-group">
      <label for="sportCalories">Calories dépensées</label>
      <input id="sportCalories" type="number" inputmode="decimal" />
    </div>

    <button onclick="addSport()">Ajouter activité</button>
  </div>

  <div class="card">
    <div class="field-group">
      <label for="weight">Poids (kg)</label>
      <input id="weight" type="number" inputmode="decimal" step="0.1" />
    </div>

    <button onclick="addWeight()">Enregistrer poids</button>
  </div>

  <script>
    let caloriesIn = 0;
    let caloriesOut = 0;

    function todayFR() {
      const d = new Date();
      const day = String(d.getDate()).padStart(2, "0");
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    }

    function updateStats() {
      document.getElementById("caloriesIn").textContent = caloriesIn + " kcal";
      document.getElementById("caloriesOut").textContent = caloriesOut + " kcal";
      document.getElementById("balance").textContent = (caloriesIn - caloriesOut) + " kcal";
    }

    function addFood() {
      const cal = parseFloat(document.getElementById("foodCalories").value);
      if (!isNaN(cal)) {
        caloriesIn += cal;
        updateStats();
        document.getElementById("food").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("foodCalories").value = "";
      }
    }

    function addSport() {
      const cal = parseFloat(document.getElementById("sportCalories").value);
      if (!isNaN(cal)) {
        caloriesOut += cal;
        updateStats();
        document.getElementById("sport").value = "";
        document.getElementById("sportCalories").value = "";
      }
    }

    function addWeight() {
      const w = document.getElementById("weight").value;
      if (w) {
        document.getElementById("weightDisplay").textContent = w + " kg";
        document.getElementById("weight").value = "";
      }
    }

    document.getElementById("date").value = todayFR();
  </script>
</body>
</html>
