<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Régime</title>

<style>
:root{
--good:#2f7d5b;
--medium:#f2b705;
--bad:#e67e22;
--empty:#eef2f4;
--card:#ffffff;
--bg:#eef3f6;
--text:#183041;
}

body{
margin:0;
font-family:-apple-system;
background:var(--bg);
padding:20px;
}

h1{
margin:0 0 10px;
}

.card{
background:var(--card);
border-radius:20px;
padding:16px;
margin-bottom:16px;
}

/* CALENDRIER */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:10px;
}

.day{
border-radius:12px;
padding:12px 0;
text-align:center;
font-weight:700;
cursor:pointer;
}

.day.good{background:#e8f5ef;color:#2f7d5b;}
.day.medium{background:#fff6d6;color:#c99500;}
.day.bad{background:#fff1e7;color:#e67e22;}
.day.empty{background:#eef2f4;color:#9aa5ad;}

.day.selected{
outline:3px solid #2f7d5b;
}

/* INPUT */

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2f7d5b;
color:white;
font-weight:bold;
}

.stat{
margin-bottom:10px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Mon Régime</h1>

<div class="card">
<div id="monthLabel"></div>
<div class="calendar" id="calendar"></div>
</div>

<div class="card">
<div class="stat" id="caloriesIn">0 kcal</div>
<div class="stat" id="caloriesOut">0 kcal</div>
<div class="stat" id="balance">0 kcal</div>
</div>

<div class="card">
<input id="food" placeholder="Aliment">
<input id="cal" type="number" placeholder="Calories">
<button onclick="addFood()">Ajouter aliment</button>
</div>

<div class="card">
<input id="sport" placeholder="Sport">
<input id="calSport" type="number" placeholder="Calories dépensées">
<button onclick="addSport()">Ajouter sport</button>
</div>

<script>

const STORAGE="regime_v4";
let data=JSON.parse(localStorage.getItem(STORAGE)||'{"days":{}}');

let current=new Date();

function iso(d){
return d.toISOString().slice(0,10);
}

function getDay(d){
if(!data.days[d]){
data.days[d]={foods:[],sports:[]};
}
return data.days[d];
}

function totalIn(day){
return day.foods.reduce((s,f)=>s+f.cal,0);
}

function totalOut(day){
return day.sports.reduce((s,f)=>s+f.cal,0);
}

function getClass(balance){
if(balance==null)return"empty";
if(balance>=200)return"bad";
if(balance>=0)return"medium";
if(balance>=-300)return"good";
return"good";
}

function renderCalendar(){

const cal=document.getElementById("calendar");
cal.innerHTML="";

const year=current.getFullYear();
const month=current.getMonth();

document.getElementById("monthLabel").innerHTML=
new Date(year,month).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

const first=new Date(year,month,1).getDay();
const days=new Date(year,month+1,0).getDate();

for(let i=0;i<(first===0?6:first-1);i++){
cal.innerHTML+="<div></div>";
}

for(let d=1;d<=days;d++){

const date=new Date(year,month,d);
const id=iso(date);
const day=getDay(id);

const balance=totalIn(day)-totalOut(day);

const cls=getClass(balance);

cal.innerHTML+=`
<div class="day ${cls}" onclick="selectDate('${id}')">
${d}
</div>`;
}
}

let selected=iso(new Date());

function selectDate(d){
selected=d;
render();
}

function render(){

renderCalendar();

const day=getDay(selected);

const inCal=totalIn(day);
const outCal=totalOut(day);
const balance=inCal-outCal;

document.getElementById("caloriesIn").innerText="Calories: "+inCal;
document.getElementById("caloriesOut").innerText="Sport: "+outCal;
document.getElementById("balance").innerText="Bilan: "+balance;

localStorage.setItem(STORAGE,JSON.stringify(data));
}

function addFood(){

const name=document.getElementById("food").value;
const cal=Number(document.getElementById("cal").value);

if(!name||!cal)return;

getDay(selected).foods.push({name,cal});

render();
}

function addSport(){

const name=document.getElementById("sport").value;
const cal=Number(document.getElementById("calSport").value);

if(!name||!cal)return;

getDay(selected).sports.push({name,cal});

render();
}

render();

</script>

</body>
</html>
