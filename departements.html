<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Départements</title>
<link rel="icon" type="image/png" href="icondpt.PNG">
<link rel="apple-touch-icon" href="icondpt.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000000;
  --panel:#111111;
  --key:#1f2937;
  --key-active:#374151;
  --text:#ffffff;
  --muted:#b8b8c2;
  --ok:#16a34a;
  --warn:#ef4444;
}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  background:radial-gradient(circle at top, #0b1f5c 0%, #000 48%);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.app{
  width:100%;
  max-width:430px;
  padding:22px 16px 24px;
  text-align:center;
}
h1{
  font-size:40px;
  line-height:1.05;
  font-weight:800;
  letter-spacing:-0.04em;
  margin-bottom:22px;
}
.display{
  min-height:118px;
  background:rgba(255,255,255,.96);
  color:#0f172a;
  border-radius:28px;
  padding:24px 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:56px;
  font-weight:800;
  letter-spacing:-0.03em;
  box-shadow:0 12px 36px rgba(0,0,0,.28);
  margin-bottom:16px;
}
.result{
  min-height:124px;
  border-radius:28px;
  background:rgba(255,255,255,.10);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 18px;
  margin-bottom:16px;
  transition:.15s ease;
}
.result.waiting{color:var(--text)}
.result.found{background:rgba(22,163,74,.24)}
.result.unknown{background:rgba(239,68,68,.18)}
.resultText{
  font-size:22px;
  font-weight:700;
  line-height:1.15;
  letter-spacing:-0.02em;
}
.resultName{
  font-size:34px;
  font-weight:800;
  line-height:1.05;
  letter-spacing:-0.03em;
}
.helper{
  color:var(--muted);
  font-size:15px;
  line-height:1.3;
  margin-bottom:18px;
}
.keyboard{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.key{
  border:none;
  border-radius:20px;
  background:var(--key);
  color:var(--text);
  padding:18px 8px;
  font-size:28px;
  font-weight:700;
  font-family:inherit;
  transition:transform .08s ease, background .08s ease, opacity .08s ease;
}
.key:active{
  transform:scale(.94);
  background:var(--key-active);
}
.key.wide{
  grid-column:span 1;
}
.key.action{
  font-size:24px;
}
.footer{
  margin-top:14px;
  color:var(--muted);
  font-size:13px;
}
@media (max-width:390px){
  h1{font-size:35px}
  .display{font-size:50px}
  .resultName{font-size:30px}
}
</style>
</head>
<body>
<div class="app">
  <h1>🇫🇷 Départements</h1>

  <div id="display" class="display"></div>

  <div id="result" class="result waiting">
    <div class="resultText">Tape un numéro</div>
  </div>


  <div class="keyboard">
    <button class="key" onclick="press('1')">1</button>
    <button class="key" onclick="press('2')">2</button>
    <button class="key" onclick="press('3')">3</button>

    <button class="key" onclick="press('4')">4</button>
    <button class="key" onclick="press('5')">5</button>
    <button class="key" onclick="press('6')">6</button>

    <button class="key" onclick="press('7')">7</button>
    <button class="key" onclick="press('8')">8</button>
    <button class="key" onclick="press('9')">9</button>

    <button class="key" onclick="press('2A')">2A</button>
    <button class="key" onclick="press('0')">0</button>
    <button class="key" onclick="press('2B')">2B</button>

    <button class="key action" onclick="clearOne()">⌫</button>
    <button class="key action" onclick="clearAll()">Effacer</button>
    <button class="key action" onclick="press('97')">97</button>
  </div>

  
</div>

<script>
const data = {
  "01":"Ain",
  "02":"Aisne",
  "03":"Allier",
  "04":"Alpes-de-Haute-Provence",
  "05":"Hautes-Alpes",
  "06":"Alpes-Maritimes",
  "07":"Ardèche",
  "08":"Ardennes",
  "09":"Ariège",
  "10":"Aube",
  "11":"Aude",
  "12":"Aveyron",
  "13":"Bouches-du-Rhône",
  "14":"Calvados",
  "15":"Cantal",
  "16":"Charente",
  "17":"Charente-Maritime",
  "18":"Cher",
  "19":"Corrèze",
  "2A":"Corse-du-Sud",
  "2B":"Haute-Corse",
  "21":"Côte-d'Or",
  "22":"Côtes-d'Armor",
  "23":"Creuse",
  "24":"Dordogne",
  "25":"Doubs",
  "26":"Drôme",
  "27":"Eure",
  "28":"Eure-et-Loir",
  "29":"Finistère",
  "30":"Gard",
  "31":"Haute-Garonne",
  "32":"Gers",
  "33":"Gironde",
  "34":"Hérault",
  "35":"Ille-et-Vilaine",
  "36":"Indre",
  "37":"Indre-et-Loire",
  "38":"Isère",
  "39":"Jura",
  "40":"Landes",
  "41":"Loir-et-Cher",
  "42":"Loire",
  "43":"Haute-Loire",
  "44":"Loire-Atlantique",
  "45":"Loiret",
  "46":"Lot",
  "47":"Lot-et-Garonne",
  "48":"Lozère",

  "50":"Manche",
  "51":"Marne",
  "52":"Haute-Marne",
  "53":"Mayenne",
  "54":"Meurthe-et-Moselle",
  "55":"Meuse",
  "56":"Morbihan",
  "57":"Moselle",
  "58":"Nièvre",
  "59":"Nord",

  "971":"Guadeloupe",
  "972":"Martinique",
  "973":"Guyane",
  "974":"La Réunion",
  "976":"Mayotte"
};

let input = "";

function canAppend(current, val){
  if (val === "2A" || val === "2B") {
    return current === "";
  }
  if (val === "97") {
    return current === "";
  }
  return current.length < 3;
}

function press(val){
  if (!canAppend(input, val)) return;

  if (val === "2A" || val === "2B") {
    input = val;
    update();
    return;
  }

  if (input === "2A" || input === "2B") return;

  if (val === "97") {
    input = "97";
    update();
    return;
  }

  if (input.length >= 3) return;
  input += val;
  update();
}

function clearOne(){
  if (input === "2A" || input === "2B") {
    input = "";
  } else {
    input = input.slice(0, -1);
  }
  update();
}

function clearAll(){
  input = "";
  update();
}

function update(){
  const display = document.getElementById("display");
  const result = document.getElementById("result");

  display.textContent = input || "—";

  if (!input) {
    result.className = "result waiting";
    result.innerHTML = '<div class="resultText">Tape un numéro</div>';
    return;
  }

  if (data[input]) {
    result.className = "result found";
    result.innerHTML = '<div class="resultName">' + data[input] + '</div>';
  } else {
    result.className = "result unknown";
    result.innerHTML = '<div class="resultName">Inconnu</div>';
  }
}

update();
</script>
</body>
</html>
