<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Départements français</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app{width:100%;max-width:420px;text-align:center}

h1{
  font-size:36px;
  font-weight:800;
  margin-bottom:25px;
}

.display{
  background:#111;
  border-radius:20px;
  padding:30px 10px;
  font-size:44px;
  margin-bottom:20px;
}

.result{
  font-size:28px;
  margin-bottom:30px;
  min-height:40px;
}

.keyboard{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.key{
  background:#1f2937;
  padding:20px;
  border-radius:16px;
  font-size:22px;
  font-weight:600;
}

.key:active{
  transform:scale(0.9);
  background:#374151;
}
</style>
</head>

<body>

<div class="app">
  <h1>🇫🇷 Départements français</h1>

  <div id="display" class="display"></div>
  <div id="result" class="result">Tape un numéro</div>

  <div class="keyboard">
    <div class="key" onclick="press('1')">1</div>
    <div class="key" onclick="press('2')">2</div>
    <div class="key" onclick="press('3')">3</div>
    <div class="key" onclick="press('4')">4</div>
    <div class="key" onclick="press('5')">5</div>
    <div class="key" onclick="press('6')">6</div>
    <div class="key" onclick="press('7')">7</div>
    <div class="key" onclick="press('8')">8</div>
    <div class="key" onclick="press('9')">9</div>
    <div class="key" onclick="press('2A')">2A</div>
    <div class="key" onclick="press('2B')">2B</div>
    <div class="key" onclick="press('0')">0</div>
    <div class="key" onclick="clearInput()">⌫</div>
  </div>
</div>

<script>
const data = {
"2A":"Corse-du-Sud","2B":"Haute-Corse","66":"Pyrénées-Orientales","75":"Paris"
};

let input="";

function press(val){
  if(input.length >= 3) return;
  input += val;
  update();
}

function clearInput(){
  input = input.slice(0,-1);
  update();
}

function update(){
  document.getElementById("display").textContent = input;
  document.getElementById("result").textContent = data[input] || "Inconnu";
}
</script>

</body>
</html>
