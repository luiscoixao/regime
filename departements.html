<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Département</title>
<meta name="theme-color" content="#08122f">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",sans-serif;
  color:#f8fafc;
  background:linear-gradient(180deg,#0d1b45,#08122f);
}
.wrap{
  min-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.app{width:100%;max-width:430px}
h1{
  text-align:center;
  margin:0 0 22px;
  font-size:30px;
  font-weight:800;
}
.input{
  width:100%;
  border:none;
  outline:none;
  border-radius:24px;
  background:#fff;
  color:#111827;
  padding:24px 18px;
  font-size:42px;
  font-weight:700;
  text-align:center;
  text-transform:uppercase;
}
.result{
  margin-top:18px;
  min-height:116px;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  background:rgba(255,255,255,.10);
  font-size:22px;
  font-weight:700;
}
.result.found{
  background:rgba(34,197,94,.20);
}
.result.unknown{
  background:rgba(239,68,68,.18);
}
.helper{
  text-align:center;
  margin-top:12px;
  color:rgba(248,250,252,.72);
  font-size:14px;
}
.name{
  font-size:34px;
  line-height:1.1;
  letter-spacing:-.02em;
}
</style>
</head>
<body>
<div class="wrap">
  <main class="app">
    <h1>🇫🇷 Département</h1>
    <input id="deptInput" class="input" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" maxlength="3" placeholder="75">
    <div id="deptResult" class="result">Tape un numéro</div>
    <div class="helper">Exemples : 66, 75, 2A, 974</div>
  </main>
</div>

<script>
(function(){
  const data = {
    "01":"Ain","02":"Aisne","03":"Allier","04":"Alpes-de-Haute-Provence","05":"Hautes-Alpes",
    "06":"Alpes-Maritimes","07":"Ardèche","08":"Ardennes","09":"Ariège","10":"Aube",
    "11":"Aude","12":"Aveyron","13":"Bouches-du-Rhône","14":"Calvados","15":"Cantal",
    "16":"Charente","17":"Charente-Maritime","18":"Cher","19":"Corrèze","2A":"Corse-du-Sud",
    "2B":"Haute-Corse","21":"Côte-d'Or","22":"Côtes-d'Armor","23":"Creuse","24":"Dordogne",
    "25":"Doubs","26":"Drôme","27":"Eure","28":"Eure-et-Loir","29":"Finistère",
    "30":"Gard","31":"Haute-Garonne","32":"Gers","33":"Gironde","34":"Hérault",
    "35":"Ille-et-Vilaine","36":"Indre","37":"Indre-et-Loire","38":"Isère","39":"Jura",
    "40":"Landes","41":"Loir-et-Cher","42":"Loire","43":"Haute-Loire","44":"Loire-Atlantique",
    "45":"Loiret","46":"Lot","47":"Lot-et-Garonne","48":"Lozère","49":"Maine-et-Loire",
    "50":"Manche","51":"Marne","52":"Haute-Marne","53":"Mayenne","54":"Meurthe-et-Moselle",
    "55":"Meuse","56":"Morbihan","57":"Moselle","58":"Nièvre","59":"Nord",
    "60":"Oise","61":"Orne","62":"Pas-de-Calais","63":"Puy-de-Dôme","64":"Pyrénées-Atlantiques",
    "65":"Hautes-Pyrénées","66":"Pyrénées-Orientales","67":"Bas-Rhin","68":"Haut-Rhin","69":"Rhône",
    "70":"Haute-Saône","71":"Saône-et-Loire","72":"Sarthe","73":"Savoie","74":"Haute-Savoie",
    "75":"Paris","76":"Seine-Maritime","77":"Seine-et-Marne","78":"Yvelines","79":"Deux-Sèvres",
    "80":"Somme","81":"Tarn","82":"Tarn-et-Garonne","83":"Var","84":"Vaucluse",
    "85":"Vendée","86":"Vienne","87":"Haute-Vienne","88":"Vosges","89":"Yonne",
    "90":"Territoire de Belfort","91":"Essonne","92":"Hauts-de-Seine","93":"Seine-Saint-Denis","94":"Val-de-Marne",
    "95":"Val-d'Oise","971":"Guadeloupe","972":"Martinique","973":"Guyane","974":"La Réunion","976":"Mayotte"
  };

  const input = document.getElementById("deptInput");
  const result = document.getElementById("deptResult");

  function normalize(value){
    return String(value || "").trim().toUpperCase().replace(/[^0-9AB]/g, "");
  }

  function update(){
    const val = normalize(input.value);
    input.value = val;
    if(!val){
      result.className = "result";
      result.textContent = "Tape un numéro";
      return;
    }
    if (Object.prototype.hasOwnProperty.call(data, val)) {
      result.className = "result found";
      result.innerHTML = '<div class="name">' + data[val] + '</div>';
    } else {
      result.className = "result unknown";
      result.innerHTML = '<div class="name">Inconnu</div>';
    }
  }

  input.addEventListener("input", update);
  input.addEventListener("keyup", update);
  input.addEventListener("change", update);
  update();
})();
</script>
</body>
</html>
